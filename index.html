<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>華容道パズル</title>
  <link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="title">華容道</h1>
      <p class="subtitle">★を下の出口まで運ぼう！</p>
    </header>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">手数</span>
        <span id="move-count" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">時間</span>
        <span id="timer" class="stat-value">0:00</span>
      </div>
    </div>

    <div class="board-wrapper">
      <div id="board" class="board" role="grid" aria-label="華容道の盤面">
        <p id="board-status" class="board-status">読み込み中…</p>
      </div>
    </div>

    <div class="controls">
      <button id="undo-btn" class="control-btn" disabled>↩ 戻す</button>
      <button id="reset-btn" class="control-btn">🔄 最初から</button>
    </div>

    <button id="surrender-btn" class="control-btn surrender-btn">🏳 参りました</button>

    <div id="demo-banner" class="demo-banner hidden">
      <span id="demo-status">正解を再生中…</span>
      <button id="stop-demo-btn" class="demo-stop-btn">やめる</button>
    </div>

    <p class="hint">コマをスワイプして動かそう！</p>
  </div>

  <div id="win-overlay" class="overlay hidden">
    <div class="win-card">
      <div class="win-emoji">🎉</div>
      <h2>クリア！</h2>
      <p id="win-stats"></p>
      <button id="play-again-btn" class="control-btn primary">もう一度</button>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>
  <script src="app.js?v=7"></script>
</body>
</html>
