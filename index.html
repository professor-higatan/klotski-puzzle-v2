<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>華容道パズル</title>
  <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>
  <div id="level-select-screen" class="screen">
    <header class="header">
      <h1 class="title">華容道</h1>
      <p class="subtitle">レベルを選んで★を出口まで運ぼう！</p>
    </header>

    <button id="continue-btn" class="control-btn continue-btn">▶ 続きから</button>

    <div id="level-grid" class="level-grid" role="list" aria-label="レベル一覧"></div>

    <p class="hint">レベル1から順にクリアすると次が解放されます</p>
  </div>

  <div id="game-screen" class="screen hidden">
    <header class="header game-header">
      <button id="back-btn" class="back-btn" aria-label="レベル選択へ">←</button>
      <div class="game-header-text">
        <p id="level-label" class="level-label">レベル 1</p>
        <h1 id="level-title" class="level-title">はじめの一歩</h1>
      </div>
    </header>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">手数</span>
        <span id="move-count" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">時間</span>
        <span id="timer" class="stat-value">0:00</span>
      </div>
    </div>

    <div class="board-wrapper">
      <div id="board" class="board" role="grid" aria-label="華容道の盤面">
        <p id="board-status" class="board-status">読み込み中…</p>
      </div>
    </div>

    <div class="controls">
      <button id="undo-btn" class="control-btn" disabled>↩ 戻す</button>
      <button id="reset-btn" class="control-btn">🔄 最初から</button>
    </div>

    <button id="surrender-btn" class="control-btn surrender-btn">🏳 参りました</button>

    <div id="demo-banner" class="demo-banner hidden">
      <span id="demo-status">正解を再生中…</span>
      <button id="stop-demo-btn" class="demo-stop-btn">やめる</button>
    </div>

    <p class="hint">コマをスワイプして動かそう！</p>
  </div>

  <div id="win-overlay" class="overlay hidden">
    <div class="win-card">
      <div class="win-emoji">🎉</div>
      <h2>クリア！</h2>
      <p id="win-level-name"></p>
      <p id="win-stats"></p>
      <div class="win-actions">
        <button id="next-level-btn" class="control-btn primary hidden">次のレベルへ ▶</button>
        <button id="play-again-btn" class="control-btn">もう一度</button>
        <button id="to-levels-btn" class="control-btn">レベル選択</button>
      </div>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>
  <script type="module" src="js/main.js?v=10"></script>
</body>
</html>
